# ─── NGINX CONFIGURATION ────────────────────────────────────────────────────────
# Reverse proxy + Angular SPA fallback + security headers
#
# URL routing:
#   /              → Angular static files (SPA, index.html fallback)
#   /api/*         → backend:3003  (Express REST API)
#   /ai-langchain/* → ai-langx:3002  (rewritten to /ai/*)
#
# SSL/TLS (HTTPS) — not included here, handled by Certbot/Let's Encrypt.
# To add HTTPS on a real domain:
#   1. Install Certbot on the host:  apt install certbot python3-certbot-nginx
#   2. Run: certbot --nginx -d yourdomain.com
#   3. Certbot auto-edits nginx.conf and adds a cron job for renewal.
#   4. The listen 80 block becomes a redirect to 443; a new 443 block is added.
#   5. Certificates live in /etc/letsencrypt/ on the host — mount that into
#      the nginx container if you want nginx to terminate TLS inside Docker.
# ────────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip compression — reduces Angular bundle transfer size by ~70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Upstream services — names match docker-compose.yaml service names.
    # Docker's internal DNS resolves these automatically inside the compose network.
    upstream backend {
        server backend:3003;
    }

    upstream ai_langx {
        server ai-langx:3002;
    }

    server {
        listen 80;

        # PLACEHOLDER: Replace _ with your actual domain once deployed.
        # For a real domain: server_name yourdomain.com www.yourdomain.com;
        # After adding a domain, run Certbot to get HTTPS (see above).
        server_name _;

        # Maximum upload size — must match backend body-parser limit (1MB) and
        # ai-langx multer limit. Increase here if you raise those limits.
        client_max_body_size 10m;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content-Security-Policy — permissive-but-useful baseline.
        # script-src 'unsafe-inline': Swagger UI injects inline scripts.
        # style-src 'unsafe-inline': Angular 17 uses inline component styles.
        # fonts.googleapis.com / fonts.gstatic.com: Google Fonts (Inter, Fira Code).
        # img-src data: blob:: inline SVGs (Lucide) and Chart.js canvas exports.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'self';" always;

        # ── Backend API ─────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Timeout for long-running expense queries
            proxy_read_timeout 30s;
        }

        # ── AI LangChain service ────────────────────────────────────────────
        # frontend/environment.prod.ts uses /ai-langchain as the base URL.
        # This block rewrites /ai-langchain/* → /ai/* before proxying.
        location /ai-langchain/ {
            rewrite ^/ai-langchain/(.*)$ /ai/$1 break;
            proxy_pass         http://ai_langx;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # AI requests can take up to 60s (agent timeout configured in ai-langx)
            proxy_read_timeout 65s;
            # PDF uploads can be large — match client_max_body_size above
            proxy_request_buffering off;
        }

        # ── Swagger docs ────────────────────────────────────────────────────
        # Optional: expose API docs via nginx. Remove in production if not needed.
        location /api-docs {
            proxy_pass         http://backend/api-docs;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ── Angular SPA ─────────────────────────────────────────────────────
        # Serve static files from the Angular build output.
        # For any path that doesn't match /api or /ai-langchain, serve index.html
        # so Angular's client-side router handles navigation.
        location / {
            root  /usr/share/nginx/html;
            index index.html;

            # SPA fallback — if the file doesn't exist on disk, serve index.html.
            # This is what makes Angular routing work (e.g., /expenses, /dashboard).
            try_files $uri $uri/ /index.html;
        }

        # ── Cache static assets ─────────────────────────────────────────────
        # Angular adds content hashes to filenames (e.g. main.abc123.js).
        # Safe to cache these indefinitely — new deploy = new hash = new URL.
        location ~* \.(js|css|png|svg|ico|woff2?)$ {
            root       /usr/share/nginx/html;
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
